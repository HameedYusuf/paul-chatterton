backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

# ─────────────────────────────────────────────────────────────────────────────
# PAGE SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
collections:
  - name: "page-settings"
    label: "⚙️ Page Settings"
    files:

      - name: "site"
        label: "🌐 Global Settings"
        file: "src/data/site.json"
        fields:
          - { name: siteName,         label: "Site Name",              widget: string }
          - { name: headerTagline,    label: "Header Tagline (italic, e.g. Demand the Impossible)", widget: string }
          - { name: navSubtitle,      label: "Header Descriptor (small caps below tagline)", widget: string, hint: "e.g. Professor of Urban Futures · Scholar-Activist · Radical Geographer" }
          - { name: siteDescription,  label: "Site Description",       widget: text }
          - { name: email,            label: "Contact Email",          widget: string }
          - { name: googleScholarUrl, label: "Google Scholar URL",     widget: string }
          - { name: universityUrl,    label: "University Profile URL", widget: string }
          - { name: heroImage,        label: "Default Profile Image",  widget: image, required: false, hint: "Fallback portrait used across the site." }
          - { name: aboutImage,       label: "About Page Image",       widget: image, required: false }
          - { name: footerTagline,    label: "Footer Tagline",         widget: string }
          - { name: footerBody,       label: "Footer Body Text",       widget: text }
          - name: navLinks
            label: "Navigation Links"
            widget: list
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: href,  label: "URL",   widget: string }
          - name: aboutDropdownLinks
            label: "About Dropdown Links"
            widget: list
            fields:
              - { name: label,    label: "Label",           widget: string }
              - { name: href,     label: "URL",             widget: string }
              - { name: external, label: "External Link?",  widget: boolean, default: false }

      - name: "home"
        label: "🏠 Home Page"
        file: "src/data/home.json"
        fields:

          # ── Page banner image ───────────────────────────────────────────────
          - { name: heroImage,  label: "Homepage Banner Image", widget: image, required: false, hint: "Optional full-width image shown at the very top of the homepage." }
          - { name: welcomeText, label: "Welcome Paragraph",    widget: text,  hint: "Intro text shown below the banner on the homepage." }

          # ── Welcome paragraph ───────────────────────────────────────────────
          - name: hero
            label: "Hero Section (hidden fields — preserved)"
            widget: object
            fields:
              - { name: body,             label: "Hero Body (unused — edit Welcome Paragraph above)", widget: text, required: false }
              - { name: label,            label: "label",                widget: hidden, default: "Academic · Activist · Author" }
              - { name: title,            label: "title",                widget: hidden, default: "Demand the Impossible" }
              - { name: ctaPrimary,       label: "ctaPrimary",           widget: hidden, default: "Let's Collaborate →" }
              - { name: ctaPrimaryHref,   label: "ctaPrimaryHref",       widget: hidden, default: "/collaborate" }
              - { name: ctaSecondary,     label: "ctaSecondary",         widget: hidden, default: "View My Work" }
              - { name: ctaSecondaryHref, label: "ctaSecondaryHref",     widget: hidden, default: "/impact" }

          # ── Feature row (portrait + 2 book panels) ──────────────────────────
          - name: featuredBooks
            label: "Featured Books (hero row + sidebar)"
            hint: "Each book appears as its own widget in the right sidebar with its cover image. The first two also appear next to Paul's portrait in the hero row."
            widget: list
            fields:
              - { name: title,       label: "Book Title",        widget: string }
              - { name: description, label: "Short Description",  widget: string }
              - { name: url,         label: "Buy / Info URL",     widget: string }
              - { name: image,       label: "Book Cover Image",   widget: image, required: false, hint: "Upload a cover image — shown in the sidebar widget and in the hero row." }

          # ── Sidebar widgets ──────────────────────────────────────────────────
          - name: upcomingTalks
            label: "Upcoming Talks (sidebar)"
            widget: list
            fields:
              - { name: venue,    label: "Event / Venue Name", widget: string }
              - { name: location, label: "Location (e.g. Leeds, UK)", widget: string, required: false }
              - { name: date,     label: "Date (e.g. June 2026)",     widget: string }

          - name: mostRead
            label: "Most Popular Articles (sidebar)"
            hint: "Update this list manually based on your analytics. Paste the title and URL of your most visited articles, blog posts, or pages."
            widget: list
            fields:
              - { name: title, label: "Article Title", widget: string }
              - { name: url,   label: "URL",           widget: string }

          - name: stats
            label: "By the Numbers (sidebar)"
            widget: list
            fields:
              - { name: number, label: "Number (e.g. 30+)", widget: string }
              - { name: label,  label: "Label",              widget: string }

          # ── CTA banner (bottom of page) ──────────────────────────────────────
          - { name: ctaHeading, label: "CTA Heading",      widget: string }
          - { name: ctaBody,    label: "CTA Body Text",    widget: text }
          - { name: ctaLabel,   label: "CTA Button Label", widget: string }
          - { name: ctaHref,    label: "CTA Button URL",   widget: string }

          # ── Preserved (not on homepage, kept so JSON stays intact) ───────────
          - { name: projectsSectionLabel,    label: "projectsSectionLabel",    widget: hidden, default: "Real-world initiatives demonstrating another way is possible" }
          - { name: publicationsSectionLabel, label: "publicationsSectionLabel", widget: hidden, default: "Research that bridges academia and activism" }
          - { name: mediaSectionLabel,       label: "mediaSectionLabel",       widget: hidden, default: "Sharing ideas beyond the academy" }

      - name: "about"
        label: "👤 About Page"
        file: "src/data/about.json"
        fields:
          - { name: portraitImage,  label: "Portrait Photo",  widget: image, required: false, hint: "Left-column portrait. Leave blank to use the Global Settings hero image." }
          - { name: heroImage,      label: "Banner Image",    widget: image, required: false, hint: "Optional full-width banner at top of the About page." }
          - { name: heroTitle,    label: "Page Title",  widget: string }
          - { name: heroSubtitle, label: "Subtitle",    widget: text }
          - { name: sectionTitle, label: "Section Title (e.g. Demanding the Impossible)", widget: string }
          - name: bio
            label: "Résumé Bio Paragraphs"
            widget: list
            field:
              name: paragraph
              label: "Paragraph"
              widget: text
          - { name: researchSectionTitle, label: "Research Section Title", widget: string }
          - { name: researchText,         label: "Research Section Text",  widget: text }
          - { name: communitySectionTitle, label: "Community Section Title", widget: string }
          - { name: communityText,         label: "Community Section Text",  widget: text }
          - name: stats
            label: "By the Numbers (sidebar)"
            widget: list
            fields:
              - { name: number, label: "Number (e.g. 30+)", widget: string }
              - { name: label,  label: "Label",              widget: string }
          - name: philosophy
            label: "Philosophy Cards (unused on current layout — preserved)"
            widget: list
            fields:
              - { name: emoji,   label: "Emoji",   widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: body,    label: "Body",    widget: text }
          - name: roles
            label: "Key Roles (sidebar)"
            widget: list
            field:
              name: role
              label: "Role"
              widget: string
          - { name: ctaHeading, label: "CTA Heading",      widget: string }
          - { name: ctaBody,    label: "CTA Body",         widget: text }
          - { name: ctaLabel,   label: "CTA Button Label", widget: string }
          - { name: ctaHref,    label: "CTA Button URL",   widget: string }

      - name: "impact"
        label: "📊 Impact Page"
        file: "src/data/impact.json"
        fields:
          - { name: heroTitle,        label: "Page Title",             widget: string }
          - { name: heroSubtitle,     label: "Subtitle",               widget: text }
          - { name: heroImage,        label: "Banner Image",           widget: image, required: false, hint: "Full-width banner shown at top of the page." }
          - { name: projectCount,     label: "Project Count Display",  widget: string }
          - { name: publicationCount, label: "Publication Count Display", widget: string }
          - { name: mediaCount,       label: "Media Count Display",    widget: string }

      - name: "roles"
        label: "🎭 Roles Page"
        file: "src/data/roles.json"
        fields:
          - { name: heroTitle,    label: "Page Title",   widget: string }
          - { name: heroSubtitle, label: "Subtitle",     widget: text }
          - { name: heroImage,    label: "Banner Image", widget: image, required: false, hint: "Full-width banner shown at top of the page." }
          - name: roles
            label: "Community Roles"
            widget: list
            fields:
              - { name: title, label: "Role Title",        widget: string }
              - { name: url,   label: "URL (leave blank if none)", widget: string, required: false }
          - { name: ctaHeading, label: "CTA Heading",      widget: string }
          - { name: ctaBody,    label: "CTA Body",         widget: text }
          - { name: ctaLabel,   label: "CTA Button Label", widget: string }
          - { name: ctaHref,    label: "CTA Button URL",   widget: string }

      - name: "collaborate"
        label: "🤝 Collaborate Page"
        file: "src/data/collaborate.json"
        fields:
          - { name: heroTitle,  label: "Page Title",   widget: string }
          - { name: heroBody,   label: "Intro Text",   widget: text }
          - { name: heroImage,  label: "Banner Image", widget: image, required: false, hint: "Full-width banner shown at top of the page." }
          - name: whoShouldReach
            label: "Who Should Reach Out"
            widget: list
            fields:
              - { name: emoji,   label: "Emoji",   widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: body,    label: "Body",    widget: text }
          - name: currentInterests
            label: "Current Interests"
            widget: list
            fields:
              - { name: emoji,   label: "Emoji",   widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: body,    label: "Body",    widget: text }
          - { name: quote,             label: "Quote",             widget: text }
          - { name: quoteAttribution,  label: "Quote Attribution", widget: string }

      - name: "presskit"
        label: "📋 Press Kit"
        file: "src/data/presskit.json"
        fields:
          - { name: portraitImage,  label: "Portrait Photo",    widget: image, required: false, hint: "Left-column portrait. Leave blank to use the Global Settings hero image." }
          - { name: pageTitle,      label: "Page Title",        widget: string }
          - { name: bio,            label: "Press Bio",         widget: text, hint: "Short bio for media use — keep to 2-3 sentences." }
          - { name: contactName,    label: "Contact Name",      widget: string }
          - { name: contactEmail,   label: "Contact Email",     widget: string }
          - { name: contactOrg,     label: "Contact Organisation", widget: string }
          - { name: contactAddress, label: "Contact Address",   widget: string }
          - name: topics
            label: "Topics & Expertise"
            hint: "List of subjects Paul speaks or comments on for media."
            widget: list
            field:
              name: topic
              label: "Topic"
              widget: string
          - name: downloads
            label: "Downloads"
            hint: "Downloadable files (bio PDFs, CV, etc). Upload files via the Media Library first, then paste the URL."
            widget: list
            fields:
              - { name: label, label: "Label (e.g. Short Bio PDF)", widget: string }
              - { name: url,   label: "File URL",                   widget: string, required: false }
          - name: photos
            label: "Press Photos"
            hint: "Upload high-resolution press photos. Displayed in a 4-column grid. Click opens full resolution."
            widget: list
            fields:
              - { name: image,   label: "Photo",   widget: image }
              - { name: caption, label: "Caption (optional, e.g. photo credit)", widget: string, required: false }

      - name: "pages"
        label: "📄 List Pages (Projects / Publications / Media / Blog)"
        file: "src/data/pages.json"
        fields:
          - name: projects
            label: "Projects Page"
            widget: object
            fields:
              - { name: heroTitle,    label: "Page Title",   widget: string }
              - { name: heroSubtitle, label: "Subtitle",     widget: text }
              - { name: heroImage,    label: "Banner Image", widget: image, required: false }
          - name: publications
            label: "Publications Page"
            widget: object
            fields:
              - { name: heroTitle,    label: "Page Title",   widget: string }
              - { name: heroSubtitle, label: "Subtitle",     widget: text }
              - { name: heroImage,    label: "Banner Image", widget: image, required: false }
          - name: media
            label: "Media Page"
            widget: object
            fields:
              - { name: heroTitle,    label: "Page Title",   widget: string }
              - { name: heroSubtitle, label: "Subtitle",     widget: text }
              - { name: heroImage,    label: "Banner Image", widget: image, required: false }
          - name: blog
            label: "Blog Page"
            widget: object
            fields:
              - { name: heroTitle,    label: "Page Title",   widget: string }
              - { name: heroSubtitle, label: "Subtitle",     widget: text }
              - { name: heroImage,    label: "Banner Image", widget: image, required: false }

# ─────────────────────────────────────────────────────────────────────────────
# CONTENT DATA (Publications & Media)
# ─────────────────────────────────────────────────────────────────────────────
  - name: "content-data"
    label: "📋 Content Data"
    files:

      - name: "publications"
        label: "📚 Publications"
        file: "src/data/publications.json"
        fields:
          - name: books
            label: "Books"
            widget: list
            fields:
              - { name: year,     label: "Year",     widget: number }
              - { name: citation, label: "Citation", widget: text }
              - { name: type,     label: "Type",     widget: hidden, default: "Book" }
              - { name: url,      label: "URL",      widget: string, required: false }
          - name: journalArticles
            label: "Journal Articles"
            widget: list
            fields:
              - { name: year,     label: "Year",     widget: number }
              - { name: citation, label: "Citation", widget: text }
              - name: type
                label: "Type"
                widget: select
                options: ["Journal Article", "Preprint"]
                default: "Journal Article"
              - { name: url, label: "URL", widget: string, required: false }
          - name: reports
            label: "Reports"
            widget: list
            fields:
              - { name: year,     label: "Year",     widget: number }
              - { name: citation, label: "Citation", widget: text }
              - { name: type,     label: "Type",     widget: hidden, default: "Report" }
              - { name: url,      label: "URL",      widget: string, required: false }
          - name: commentPieces
            label: "Comment Pieces"
            widget: list
            fields:
              - { name: year,     label: "Year",     widget: number }
              - { name: citation, label: "Citation", widget: text }
              - { name: type,     label: "Type",     widget: hidden, default: "Comment Piece" }
              - { name: url,      label: "URL",      widget: string, required: false }

      - name: "media"
        label: "🎥 Media & Talks"
        file: "src/data/media.json"
        fields:
          - name: items
            label: "Media Items"
            widget: list
            fields:
              - { name: title,    label: "Title",    widget: string }
              - name: type
                label: "Type"
                widget: select
                options: ["Podcast", "Video", "Talk", "Press"]
              - { name: platform,  label: "Platform", widget: string, required: false }
              - { name: url,       label: "URL",      widget: string, required: false, hint: "YouTube links will have thumbnails fetched automatically" }
              - { name: date,      label: "Year",     widget: string, required: false }
              - { name: thumbnail, label: "Thumbnail Image", widget: image, required: false, hint: "Optional — upload a custom thumbnail. Leave blank for YouTube auto-thumbnails." }

# ─────────────────────────────────────────────────────────────────────────────
# BLOG POSTS
# ─────────────────────────────────────────────────────────────────────────────
  - name: "blog"
    label: "📝 Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: title,   label: "Title",                      widget: string }
      - { name: date,    label: "Date (e.g. 2025)",           widget: string }
      - { name: excerpt, label: "Excerpt",                    widget: text }
      - { name: outlet,  label: "Outlet / Publication",       widget: string, required: false }
      - { name: url,     label: "Original Article URL",       widget: string, required: false }
      - { name: body,    label: "Content",                    widget: markdown }

# ─────────────────────────────────────────────────────────────────────────────
# PROJECTS
# ─────────────────────────────────────────────────────────────────────────────
  - name: "projects"
    label: "🏗️ Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: title,       label: "Title",             widget: string }
      - { name: role,        label: "Role",              widget: string }
      - { name: description, label: "Short Description", widget: text }
      - { name: impact,      label: "Impact Statement",  widget: string, required: false }
      - { name: url,         label: "External URL",      widget: string, required: false }
      - { name: image,       label: "Hero / Featured Image", widget: image, required: false, hint: "Main image — shown as a full-width banner at the top of the project page." }
      - name: gallery
        label: "Image Gallery"
        widget: list
        required: false
        hint: "Additional images shown in a grid below the main content."
        field:
          name: image
          label: "Image"
          widget: image
      - { name: order,       label: "Sort Order",        widget: number, required: false, default: 99 }
      - { name: body,        label: "Full Content",      widget: markdown }
